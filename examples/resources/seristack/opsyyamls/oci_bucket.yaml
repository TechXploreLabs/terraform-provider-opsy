    defined_tags="$(normalize_json_optional "$defined_tags_raw")" || { echo "defined_tags_json must be valid JSON" >&2; exit 1; }

    cmd=(oci $CONFIG os bucket update --namespace "$namespace_raw" --name "$name_raw")
    [ -n "$compartment_id" ] && cmd+=(--compartment-id "$compartment_id")
    [ -n "$auto_tiering" ] && cmd+=(--auto-tiering "$auto_tiering")
    [ -n "$versioning" ] && cmd+=(--versioning "$versioning")
    [ -n "$freeform_tags" ] && cmd+=(--freeform-tags "$freeform_tags")
    [ -n "$defined_tags" ] && cmd+=(--defined-tags "$defined_tags")

    set +e
    updated_json="$(${cmd[@]} 2>&1)"
    rc=$?
    set -e
    if [ $rc -ne 0 ]; then
      echo "$updated_json" >&2
      exit $rc
    fi

    jq -n \
      --arg id "$namespace_raw/$name_raw" \
      --argjson update_result "$updated_json" \
      '{id: $id, output: {bucket: $update_result.data}}'

- name: DELETE
  count: 1
  cmds:
  - |
    unset OCI_CLI_AUTH
    CONFIG="--config-file <update config file path> --profile DEFAULT"

    namespace_raw="{{.Vars.namespace}}"
    name_raw="{{.Vars.name}}"

    if [ -z "$namespace_raw" ] || [ "$namespace_raw" = "<no value>" ] || [ -z "$name_raw" ] || [ "$name_raw" = "<no value>" ]; then
      echo "namespace and name are required for DELETE" >&2
      exit 1
    fi

    oci $CONFIG os bucket delete --namespace "$namespace_raw" --name "$name_raw" --force || exit 1

    jq -n --arg id "$namespace_raw/$name_raw" '{id: $id, output: {deleted: true}}'

- name: RECREATE_ON
  count: 1
  cmds:
  - |
    jq -n '["namespace", "name"]'
