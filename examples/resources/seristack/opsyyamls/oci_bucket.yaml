stacks:
- name: DATASOURCE
  count: 1
  cmds:
  - |
    unset OCI_CLI_AUTH
    CONFIG="--config-file <update config file path> --profile DEFAULT"

    namespace_raw="{{.Vars.namespace}}"
    name_raw="{{.Vars.name}}"

    if [ -z "$namespace_raw" ] || [ "$namespace_raw" = "<no value>" ] || [ -z "$name_raw" ] || [ "$name_raw" = "<no value>" ]; then
      echo "namespace and name are required for DATASOURCE" >&2
      exit 1
    fi

    bucket_json="$(oci $CONFIG os bucket get --namespace "$namespace_raw" --name "$name_raw")" || exit 1

    jq -n \
      --arg id "$namespace_raw/$name_raw" \
      --argjson data_result "$bucket_json" \
      '{id: $id, output: {bucket: $data_result.data}}'

- name: CREATE
  count: 1
  cmds:
  - |
    unset OCI_CLI_AUTH
    CONFIG="--config-file <update config file path> --profile DEFAULT"

    compartment_id_raw="{{.Vars.compartment_id}}"
    namespace_raw="{{.Vars.namespace}}"
    name_raw="{{.Vars.name}}"
    storage_tier_raw="{{.Vars.storage_tier}}"
    auto_tiering_raw="{{.Vars.auto_tiering}}"
    versioning_raw="{{.Vars.versioning}}"
    kms_key_id_raw="{{.Vars.kms_key_id}}"
    freeform_tags_raw='{{.Vars.freeform_tags_json}}'
    defined_tags_raw='{{.Vars.defined_tags_json}}'

    normalize_optional() {
      local value="$1"
      if [ -z "$value" ] || [ "$value" = "<no value>" ]; then
        echo ""
      else
        echo "$value"
      fi
    }

    normalize_json_optional() {
      local value="$1"
      if [ -z "$value" ] || [ "$value" = "<no value>" ]; then
        echo ""
      else
        echo "$value" | jq -c . 2>/dev/null || return 1
      fi
    }

    missing=false
    if [ -z "$compartment_id_raw" ] || [ "$compartment_id_raw" = "<no value>" ]; then
      echo "compartment_id is required" >&2; missing=true
    fi
    if [ -z "$namespace_raw" ] || [ "$namespace_raw" = "<no value>" ]; then
      echo "namespace is required" >&2; missing=true
    fi
    if [ -z "$name_raw" ] || [ "$name_raw" = "<no value>" ]; then
      echo "name is required" >&2; missing=true
    fi
    if [ "$missing" = true ]; then
      echo "compartment_id, namespace, and name are required." >&2
      exit 1
    fi

    compartment_id="$compartment_id_raw"
    namespace="$namespace_raw"
    name="$name_raw"
    storage_tier="$(normalize_optional "$storage_tier_raw")"
    auto_tiering="$(normalize_optional "$auto_tiering_raw")"
    versioning="$(normalize_optional "$versioning_raw")"
    kms_key_id="$(normalize_optional "$kms_key_id_raw")"
    freeform_tags="$(normalize_json_optional "$freeform_tags_raw")" || { echo "freeform_tags_json must be valid JSON" >&2; exit 1; }
    defined_tags="$(normalize_json_optional "$defined_tags_raw")" || { echo "defined_tags_json must be valid JSON" >&2; exit 1; }

    cmd=(oci $CONFIG os bucket create --compartment-id "$compartment_id" --namespace "$namespace" --name "$name")
    [ -n "$storage_tier" ] && cmd+=(--storage-tier "$storage_tier")
    [ -n "$auto_tiering" ] && cmd+=(--auto-tiering "$auto_tiering")
    [ -n "$versioning" ] && cmd+=(--versioning "$versioning")
    [ -n "$kms_key_id" ] && cmd+=(--kms-key-id "$kms_key_id")
    [ -n "$freeform_tags" ] && cmd+=(--freeform-tags "$freeform_tags")
    [ -n "$defined_tags" ] && cmd+=(--defined-tags "$defined_tags")

    set +e
    created_json="$(${cmd[@]} 2>&1)"
    rc=$?
    set -e
    if [ $rc -ne 0 ]; then
      echo "$created_json" >&2
      exit $rc
    fi

    jq -n \
      --arg id "$namespace/$name" \
      --argjson create_result "$created_json" \
      '{id: $id, output: {bucket: $create_result.data}}'

- name: READ
  count: 1
  cmds:
  - |
    unset OCI_CLI_AUTH
    CONFIG="--config-file <update config file path> --profile DEFAULT"

    namespace_raw="{{.Vars.namespace}}"
    name_raw="{{.Vars.name}}"
    if [ -z "$namespace_raw" ] || [ "$namespace_raw" = "<no value>" ] || [ -z "$name_raw" ] || [ "$name_raw" = "<no value>" ]; then
      echo "namespace and name are required for READ" >&2
      exit 1
    fi

    set +e
    bucket_json="$(oci $CONFIG os bucket get --namespace "$namespace_raw" --name "$name_raw" 2>&1)"
    rc=$?
    set -e

    if [ $rc -ne 0 ]; then
      if echo "$bucket_json" | grep -qi "NotAuthorizedOrNotFound\|404\|Not Found"; then
        jq -n '{not_found: true}'
        exit 0
      fi
      echo "$bucket_json" >&2
      exit $rc
    fi

    jq -n \
      --arg id "$namespace_raw/$name_raw" \
      --argjson read_result "$bucket_json" \
      '{id: $id, output: {bucket: $read_result.data}}'

